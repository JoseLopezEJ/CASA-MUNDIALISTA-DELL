<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pase de Acceso Casa Mundialista</title>
  <link rel="stylesheet" href="style.css">
  <!-- Librería obligatoria para generar el código QR -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

  <div class="container">
    <div class="card" id="main-card">
      
      <!-- VISTA NORMAL: Idéntica a image_abb3c6.png -->
      <div id="normal-view">
        <div class="card-header">
          <h1 class="header-title">PASE DE ACCESO CASA MUNDIALISTA</h1>
          <h2 class="header-subtitle">INGRAM-DELL</h2>
          <p class="header-badge">INVITACIÓN PERSONALIZADA</p>
        </div>
        
        <div class="card-body">
          <!-- Espacio superior libre al quitar el nombre -->
          <div class="qr-dotted-container">
            <div id="qrcode"></div>
          </div>
          
          <div class="id-button-container">
            <div class="id-badge" id="user-id">Cargando...</div>
          </div>
          
          <p class="footer-text">Presenta este código QR en la entrada para registrar tu ingreso al evento.</p>
        </div>
      </div>

      <!-- VISTA DE CONFIRMACIÓN -->
      <div id="confirmed-view" style="display: none;">
        <div class="success-icon">✓</div>
        <h2 class="success-title">¡INGRESO CONFIRMADO!</h2>
        <p class="success-message">Tu pase de entrada ya ha sido registrado con éxito en la puerta.</p>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
